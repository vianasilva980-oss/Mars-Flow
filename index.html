<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARS - FLOW</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="manifest" href="manifest.json">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="topo-container">
    <div class="pilula-esquerda">
        <div class="pill-group">
            <div class="circle-user">🏢</div>
            <div class="pill-setores" id="nome-setor-pill">SETORES</div>
        </div>
    </div>

    <div class="pilula-direita">
        <div class="logo-box">MARS</div>
        <div class="desc-box" id="descricao-setor">
            FLOW - GERENCIADOR DE FLUXO
        </div>
    </div>
</header>

<main class="container-principal">

    <!-- SIDEBAR RETRÁTIL -->
    <aside class="sidebar">
        <div class="menu-item btn-home" id="btn-home-sidebar" onclick="voltarHome()" style="display: none;">
            <div class="menu-emoji">⬅️</div> 
            <span>HOME</span>
        </div>

        <div class="menu-item" id="btn-adicionarcarga">
            <div class="menu-emoji">➕</div>
            <span>ADICIONAR CARGA</span>
        </div>
        <div class="menu-item" id="btn-portaria">
            <div class="menu-emoji">👮</div>
            <span>PORTARIA</span>
        </div>
        <div class="menu-item" id="btn-lab">
            <div class="menu-emoji">🧪</div>
            <span>LABORATÓRIO</span>
        </div>
        <div class="menu-item" id="btn-moega">
            <div class="menu-emoji">🏗️</div>
            <span>MOEGA</span>
        </div>
        <div class="menu-item" id="btn-logistica">
            <div class="menu-emoji">🚛</div>
            <span>LOGÍSTICA</span>
        </div>
        <div class="menu-item" id="btn-manufatura">
            <div class="menu-emoji">🏭</div>
            <span>MANUFATURA</span>
        </div>
        <div class="menu-item" id="btn-manutençao">
            <div class="menu-emoji">🛠️</div>
            <span>MANUTENÇÃO</span>
        </div>
        <div class="menu-item" id="btn-almoxarifado">
            <div class="menu-emoji">📦</div>
            <span>ALMOXARIFADO</span>
        </div>
        <div class="menu-item" id="btn-seguranca">
            <div class="menu-emoji">🛡️</div>
            <span>SEGURANÇA</span>
        </div>
        <div class="menu-item" id="btn-qualidade">
            <div class="menu-emoji">💎</div>
            <span>QUALIDADE</span>
        </div>
        <div class="menu-item" id="btn-config">
            <div class="menu-emoji">⚙️</div>
            <span>GERENCIAMENTO</span>
        </div>
    </aside>

    <section class="area-ilustracao" id="conteudo-dinamico">
        <img src="img/areaprincipal.png" class="img-central" id="img-boas-vindas" onclick="proximoSlide()" style="cursor: pointer;">

        <!-- Container de Login -->
        <div id="login-container" style="display: none; width: 100%; height: 100%; flex-direction: column; align-items: center;">
            <div class="login-sidebar">
                <div class="user-icon-large">
                    <!-- Emoji dinâmico para o login -->
                    <div class="circle-user" id="emoji-login-setor" style="width: 100px; height: 100px; font-size: 50px; margin: 0 auto;">👤</div>
                </div>
                <h2 id="titulo-login">SETOR</h2>
                <input type="text" id="user-input" placeholder="Nome de usuário do setor">
                <input type="password" id="pass-input" placeholder="Senha">
                <button class="btn-entrar">➔</button>
            </div>
            <div class="login-main-view" style="flex-grow: 1; background-color: #001f5c; height: 100%;"></div>
        </div>
    </section>


</main>

<footer class="rodape-container">
    <div class="pilula-rodape">
        <span class="unidade">MARS® / Recife-PE</span>
        <span class="creditos">Developed by R.V™ & AI | <span id="sw-version">v0.0.0</span></span>
    </div>
</footer>

<button id="btn-instalar-pwa" style="display: none; position: fixed; bottom: 60px; right: 15px; padding: 20px 25px; background-color: #001f5c; color: #ffffff; border: 2px solid #ffffff; border-radius: 50px; font-weight: bold; z-index: 10000; cursor: pointer;">
  📥 Instalar Aplicativo
</button>

<script src="script.js"></script>

<!-- Notificação de Atualização PWA -->
<div id="update-notification" style="display:none;" class="pwa-alert">
    <span>Nova versão disponível!</span>
    <button id="btn-atualizar">Atualizar Agora</button>
</div>

</body>
</html>
